<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Ad-Free Sudoku</title>
    
    <!-- LINK TO YOUR NEW CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Entry Screen Panel -->
    <div class="screen" id="introScreen">
        <div class="menu-title">Sudoku</div>
        <div class="menu-subtitle">Ad-Free Custom Edition</div>
        <div class="menu-btn-group">
            <button class="difficulty-btn btn-easy" onclick="selectDifficulty('easy')">Easy</button>
            <button class="difficulty-btn btn-medium" onclick="selectDifficulty('medium')">Medium</button>
            <button class="difficulty-btn btn-hard" onclick="selectDifficulty('hard')">Hard</button>
        </div>
    </div>

    <!-- Active Game Dashboards -->
    <div class="game-header">
        <button class="exit-btn" onclick="confirmAndExit()">← Menu</button>
        <div class="diff-tag" id="difficultyTag">Easy</div>
        <div id="timerDisplay">00:00</div>
        <div id="bestTimeDisplay">Best: --:--</div>
    </div>
    
    <div class="grid" id="board"></div>
    <div class="numpad" id="numpad"></div>

    <!-- Celebration Screen -->
    <div class="victory-screen" id="victoryScreen">
        <h2>You Win! 🎉</h2>
        <p>Puzzle completely solved.</p>
        <div class="victory-time-msg" id="victoryTimeMsg">Your Time: 00:00</div>
        <button class="victory-btn" onclick="exitToMenu()">Main Menu</button>
    </div>

    <!-- LINK TO YOUR JS ENGINE (Note the type="module") -->
    <script type="module" src="game.js"></script>
</body>
</html>
